<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>漢字パーツ学習ゲーム</title>
  <style>
    :root {
      --bg: #f3f8f5;
      --panel: #ffffff;
      --ink: #24312c;
      --muted: #607069;
      --accent: #087f67;
      --accent-dark: #075b4b;
      --soft: #e4f4ed;
      --sun: #f5b642;
      --gentle: #fff1bf;
      --wrong: #fff0e9;
      --line: #c9ddd4;
      --shadow: 0 12px 30px rgba(28, 67, 53, 0.11);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: linear-gradient(145deg, #f3f8f5, #edf5fb);
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", system-ui, sans-serif;
    }

    button { font: inherit; }

    .shell {
      width: min(1040px, 100%);
      margin: 0 auto;
      padding: 20px 14px 40px;
    }

    .app-title {
      margin: 0 0 16px;
      color: #17483a;
      font-size: clamp(30px, 6vw, 46px);
      line-height: 1.2;
      text-align: center;
    }

    .panel {
      padding: clamp(18px, 4vw, 32px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
    }

    .hidden { display: none !important; }

    .screen-heading {
      margin: 0;
      font-size: clamp(28px, 6vw, 42px);
      text-align: center;
    }

    .screen-lead {
      margin: 8px 0 22px;
      color: var(--muted);
      font-size: 19px;
      line-height: 1.6;
      text-align: center;
    }

    .series-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .grade-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .grade-button {
      min-height: 82px;
      border: 2px solid var(--accent);
      border-radius: 8px;
      color: #fff;
      background: var(--accent);
      font-size: clamp(21px, 5vw, 27px);
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 0 var(--accent-dark);
    }

    .series-button {
      min-height: 130px;
      padding: 18px;
      border: 2px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: #fff;
      text-align: left;
      cursor: pointer;
      touch-action: manipulation;
      box-shadow: 0 3px 0 #bed4cb;
    }

    .series-button:active { transform: translateY(1px); }

    .series-button.complete {
      border-color: #e7ae37;
      background: #fff9df;
      box-shadow: 0 3px 0 #e7ae37;
    }

    .series-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .series-name { font-size: 23px; font-weight: 800; }
    .series-radical { color: var(--accent-dark); font-size: 40px; font-weight: 800; }
    .series-progress { display: block; margin-top: 10px; color: var(--muted); font-size: 17px; font-weight: 700; }
    .badge-mark { color: #805c00; font-size: 17px; font-weight: 800; }

    .wide-button,
    .action-button {
      min-height: 60px;
      border: 0;
      border-radius: 8px;
      padding: 14px 18px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      touch-action: manipulation;
    }

    .wide-button { width: 100%; margin-top: 14px; }
    button:disabled { cursor: not-allowed; opacity: 0.45; }
    button:focus-visible { outline: 4px solid #f2c75c; outline-offset: 3px; }

    .primary { color: #fff; background: var(--accent); box-shadow: 0 4px 0 var(--accent-dark); }
    .secondary { color: var(--accent-dark); background: #fff; border: 2px solid var(--line); box-shadow: 0 3px 0 #bed4cb; }
    .gentle { color: #5b4209; background: var(--gentle); box-shadow: 0 3px 0 #ddbd57; }

    .game-topbar {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      align-items: center;
    }

    .question-meta,
    .score { color: var(--muted); font-size: 18px; font-weight: 800; text-align: center; }

    .meter { height: 13px; overflow: hidden; border-radius: 999px; background: #dce9e3; }
    .meter-fill { height: 100%; width: 0; background: linear-gradient(90deg, var(--accent), var(--sun)); transition: width 180ms ease; }

    .prompt {
      margin-top: 18px;
      padding: 18px;
      border-radius: 8px;
      background: var(--soft);
      text-align: center;
    }

    .prompt-label { margin: 0; color: var(--muted); font-size: 18px; font-weight: 800; }
    .reading { margin: 8px 0 0; font-size: clamp(40px, 11vw, 76px); font-weight: 800; line-height: 1.2; }
    .target-reading { color: var(--accent-dark); text-decoration: underline; text-decoration-color: var(--sun); text-underline-offset: 0.16em; }
    .grade-label { margin: 8px 0 0; color: var(--muted); font-size: 17px; font-weight: 700; }

    .work-area { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 20px; }
    .section-title { margin: 0 0 10px; color: var(--muted); font-size: 20px; font-weight: 800; }
    .choices { display: grid; grid-template-columns: repeat(auto-fit, minmax(84px, 1fr)); gap: 10px; }

    .part-button {
      min-height: 88px;
      border: 2px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: #fff;
      font-size: 40px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 3px 0 #bed4cb;
    }

    .part-button.selected { border-color: var(--accent); color: var(--accent-dark); background: #dcf5eb; box-shadow: 0 3px 0 #83c8b5; }
    .selected-parts { display: grid; grid-template-columns: 1fr 45px 1fr; gap: 8px; align-items: center; }

    .slot {
      min-height: 110px;
      display: grid;
      place-items: center;
      border: 3px dashed var(--line);
      border-radius: 8px;
      background: #fbfffd;
      font-size: 50px;
      font-weight: 800;
    }

    .plus { color: var(--muted); font-size: 34px; font-weight: 800; text-align: center; }
    .actions { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; margin-top: 20px; }

    .feedback {
      min-height: 120px;
      margin-top: 18px;
      padding: 18px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: #fff;
      text-align: center;
    }

    .feedback.correct { border-color: #75cba9; background: #e4f9ef; }
    .feedback.wrong { border-color: #e8ad99; background: var(--wrong); }
    .feedback-main { margin: 0; font-size: clamp(25px, 7vw, 42px); font-weight: 800; line-height: 1.35; }
    .feedback-sub { margin: 8px 0 0; color: var(--muted); font-size: 20px; line-height: 1.55; }
    .answer-line { display: block; }
    .answer-kanji { font-size: clamp(54px, 13vw, 82px); line-height: 1.05; }
    .answer-word { margin-top: 8px; color: var(--accent-dark); font-size: clamp(30px, 8vw, 46px); }
    .answer-reading { margin-top: 4px; font-size: clamp(23px, 6vw, 32px); }
    .answer-meaning { margin-top: 10px; color: var(--muted); font-size: 20px; }
    .answer-picture { margin-top: 10px; font-size: 46px; }
    .answer-note { display: block; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); color: var(--muted); font-size: 17px; font-weight: 700; }
    .answer-parts { display: grid; gap: 6px; margin-top: 14px; padding: 14px; border-radius: 8px; color: var(--ink); background: rgba(255, 255, 255, 0.72); font-size: 17px; font-weight: 700; text-align: left; }
    .answer-parts-title { color: var(--accent-dark); font-weight: 800; }

    .summary-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; margin-top: 20px; }
    .summary-item { padding: 16px 10px; border: 2px solid var(--line); border-radius: 8px; background: #fff; text-align: center; font-size: 17px; font-weight: 800; }
    .summary-number { display: block; color: var(--accent-dark); font-size: 40px; line-height: 1.1; }
    .badge-section { margin-top: 24px; }
    .badge-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(145px, 1fr)); gap: 10px; }
    .badge-item { padding: 14px; border: 2px solid var(--line); border-radius: 8px; color: var(--muted); background: #f7faf8; text-align: center; font-size: 16px; font-weight: 800; }
    .badge-item.complete { border-color: #e3ae38; color: #694c00; background: #fff7d4; }
    .badge-icon { display: block; margin-bottom: 4px; font-size: 30px; }
    .review-list { display: grid; gap: 9px; margin-top: 10px; }
    .review-button { min-height: 58px; padding: 12px 16px; border: 2px solid var(--line); border-radius: 8px; color: var(--ink); background: #fff; font-size: 18px; font-weight: 800; text-align: left; cursor: pointer; }

    body.game-active {
      height: 100dvh;
      overflow: hidden;
    }

    .game-active .shell {
      height: 100dvh;
      padding: max(6px, env(safe-area-inset-top)) max(6px, env(safe-area-inset-right)) max(6px, env(safe-area-inset-bottom)) max(6px, env(safe-area-inset-left));
    }

    .game-active .app-title { display: none; }

    .game-active #gameScreen {
      width: min(1040px, 100%);
      height: 100%;
      display: grid;
      grid-template-rows: auto auto auto auto minmax(0, 1fr);
      gap: clamp(5px, 1.2vh, 10px);
      padding: clamp(7px, 1.8vh, 14px);
      overflow: hidden;
    }

    .game-active .game-topbar {
      grid-template-columns: minmax(96px, auto) 1fr minmax(66px, auto);
      gap: 7px;
    }

    .game-active .question-meta,
    .game-active .score {
      font-size: clamp(11px, 2.8vw, 15px);
      line-height: 1.2;
      text-align: center;
    }

    .game-active .meter { height: 9px; }

    .game-active .prompt {
      margin: 0;
      padding: clamp(5px, 1.2vh, 10px);
    }

    .game-active .prompt-label { font-size: clamp(12px, 3.2vw, 16px); }
    .game-active .reading { margin-top: 2px; font-size: clamp(28px, 8vw, 42px); line-height: 1.05; }
    .game-active .grade-label { margin-top: 2px; font-size: clamp(11px, 2.8vw, 14px); }

    .game-active .work-area {
      grid-template-columns: minmax(0, 1.35fr) minmax(0, 1fr);
      gap: 8px;
      margin: 0;
    }

    .game-active .section-title {
      margin-bottom: 4px;
      font-size: clamp(13px, 3.2vw, 16px);
    }

    .game-active .choices {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 5px;
    }

    .game-active .part-button {
      min-height: clamp(43px, 7.4vh, 58px);
      padding: 0;
      font-size: clamp(27px, 7vw, 36px);
    }

    .game-active .selected-parts {
      grid-template-columns: 1fr 22px 1fr;
      gap: 4px;
    }

    .game-active .slot {
      min-height: clamp(66px, 11vh, 86px);
      border-width: 2px;
      font-size: clamp(32px, 8vw, 43px);
    }

    .game-active .plus { font-size: 23px; }

    .game-active .actions {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      margin: 0;
    }

    .game-active .action-button {
      min-height: clamp(40px, 6.5vh, 50px);
      padding: 4px 3px;
      font-size: clamp(11px, 3vw, 14px);
      line-height: 1.15;
    }

    .game-active .feedback {
      min-height: 0;
      margin: 0;
      padding: clamp(6px, 1.5vh, 12px);
      display: grid;
      align-content: center;
      overflow: hidden;
    }

    .game-active .feedback-main { font-size: clamp(28px, 8vw, 46px); }
    .game-active .feedback-sub { margin-top: 4px; font-size: clamp(15px, 4vw, 20px); line-height: 1.35; }

    .game-active .feedback.correct .feedback-main {
      width: 100%;
      display: grid;
      grid-template-columns: minmax(82px, 0.8fr) minmax(0, 1.7fr);
      grid-template-rows: auto auto minmax(0, 1fr) auto auto;
      column-gap: 10px;
      align-items: center;
      line-height: 1.15;
    }

    .game-active .answer-kanji {
      grid-column: 1;
      grid-row: 1 / 4;
      font-size: clamp(76px, 22vw, 118px);
    }

    .game-active .answer-word {
      grid-column: 2;
      grid-row: 1;
      margin: 0;
      font-size: clamp(29px, 8vw, 48px);
    }

    .game-active .answer-reading {
      grid-column: 2;
      grid-row: 2;
      margin: 2px 0 0;
      font-size: clamp(19px, 5vw, 28px);
    }

    .game-active .answer-meaning {
      grid-column: 2;
      grid-row: 3 / 5;
      margin: 4px 0 0;
      font-size: clamp(13px, 3.5vw, 18px);
      line-height: 1.3;
    }

    .game-active .answer-picture {
      grid-column: 1;
      grid-row: 4;
      margin: 0;
      font-size: clamp(30px, 8vw, 44px);
    }

    .game-active .answer-parts {
      grid-column: 1 / -1;
      grid-row: 5;
      gap: 2px;
      margin-top: 5px;
      padding: 6px 8px;
      font-size: clamp(11px, 2.8vw, 14px);
      line-height: 1.25;
    }

    .game-active .answer-note { display: none; }

    @media (max-height: 590px) {
      .game-active #gameScreen { gap: 4px; padding: 5px; }
      .game-active .prompt { padding: 3px 6px; }
      .game-active .prompt-label,
      .game-active .grade-label { display: none; }
      .game-active .part-button { min-height: 38px; }
      .game-active .slot { min-height: 54px; }
      .game-active .action-button { min-height: 36px; }
      .game-active .answer-parts { padding: 3px 5px; font-size: 10px; }
    }

    @media (min-width: 760px) {
      .shell { padding-top: 28px; }
      .game-topbar { grid-template-columns: 190px 1fr 230px; }
      .question-meta { text-align: left; }
      .score { text-align: right; }
      .work-area { grid-template-columns: 1.15fr 1fr; }
      .actions { grid-template-columns: repeat(6, minmax(0, 1fr)); }
      .summary-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <main class="shell">
    <h1 class="app-title">漢字パーツ学習ゲーム</h1>

    <section class="panel" id="seriesScreen">
      <h2 class="screen-heading">シリーズをえらぼう</h2>
      <p class="screen-lead">学年または部首をえらんでチャレンジしよう。</p>
      <div class="grade-grid">
        <button class="grade-button" id="grade5Button" type="button">小学5年の問題</button>
        <button class="grade-button" id="grade6Button" type="button">小学6年の問題</button>
      </div>
      <p class="section-title">部首からえらぶ</p>
      <div class="series-grid" id="seriesGrid"></div>
      <button class="wide-button secondary" id="allQuestionsButton" type="button">ぜんぶの問題に挑戦</button>
      <button class="wide-button secondary hidden" id="resumeButton" type="button">ゲームにもどる</button>
    </section>

    <section class="panel hidden" id="gameScreen" aria-live="polite">
      <div class="game-topbar">
        <div class="question-meta" id="questionMeta"></div>
        <div class="meter" aria-hidden="true"><div class="meter-fill" id="meterFill"></div></div>
        <div class="score" id="scoreText"></div>
      </div>

      <div class="prompt">
        <p class="prompt-label" id="promptLabel"></p>
        <p class="reading" id="readingText"></p>
        <p class="grade-label" id="gradeText"></p>
      </div>

      <div class="work-area">
        <section>
          <p class="section-title">パーツ候補</p>
          <div class="choices" id="choices"></div>
        </section>
        <section>
          <p class="section-title">選んだパーツ</p>
          <div class="selected-parts">
            <div class="slot" id="slotA">?</div>
            <div class="plus">+</div>
            <div class="slot" id="slotB">?</div>
          </div>
        </section>
      </div>

      <div class="actions">
        <button class="action-button primary" id="checkButton" type="button">こたえあわせ</button>
        <button class="action-button gentle" id="skipButton" type="button">わからない</button>
        <button class="action-button secondary" id="backButton" type="button">もどる</button>
        <button class="action-button secondary" id="nextButton" type="button">つぎへ</button>
        <button class="action-button secondary" id="resetButton" type="button">えらびなおす</button>
        <button class="action-button secondary" id="chooseSeriesButton" type="button">シリーズにもどる</button>
      </div>

      <div class="feedback" id="feedback">
        <p class="feedback-main" id="feedbackMain">パーツを選んでみよう</p>
        <p class="feedback-sub" id="feedbackSub">2つ選んだら「こたえあわせ」を押してね。</p>
      </div>
    </section>

    <section class="panel hidden" id="summaryScreen" aria-live="polite">
      <h2 class="screen-heading">結果</h2>
      <p class="screen-lead" id="summaryTitle"></p>
      <div class="summary-grid">
        <div class="summary-item"><span class="summary-number" id="correctCount">0</span>正解</div>
        <div class="summary-item"><span class="summary-number" id="wrongCount">0</span>不正解</div>
        <div class="summary-item"><span class="summary-number" id="skippedCount">0</span>わからない</div>
        <div class="summary-item"><span class="summary-number" id="unansweredCount">0</span>未回答</div>
      </div>

      <div class="actions" style="grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));">
        <button class="action-button primary" id="retryButton" type="button">復習する</button>
        <button class="action-button secondary" id="replayButton" type="button">もう一度やる</button>
        <button class="action-button secondary" id="seriesButton" type="button">シリーズを選ぶ</button>
      </div>

      <section class="badge-section">
        <p class="section-title">シリーズ達成バッジ</p>
        <div class="badge-grid" id="badgeGrid"></div>
      </section>

      <section class="badge-section">
        <p class="section-title">復習する問題</p>
        <div class="review-list" id="reviewList"></div>
      </section>
    </section>
  </main>

    const compoundTargetReadings = {
      tree_002: "あい",
      water_006: "えき",

      move_007: "い"

    questions.forEach((question) => {
      const series = seriesDefinitions[question.seriesId];
      question.seriesName = series.name;
      question.radicalMeaning = series.meaning;
      question.otherPart = question.parts[1];
      question.otherPartMeaning = otherPartMeanings[question.id];
      const stemReading = question.okurigana && question.reading.endsWith(question.okurigana)
        ? question.reading.slice(0, -question.okurigana.length)
        : question.reading;
      question.targetReading = compoundTargetReadings[question.id] || stemReading;
    });

    const seriesOrder = [...new Map(questions.map((question) => [question.seriesId, {
      id: question.seriesId,
      name: question.seriesName,
      radical: question.radical
    }])).values()];

    function shuffleChoices(sourceChoices) {
      const shuffled = [...sourceChoices];
      for (let index = shuffled.length - 1; index > 0; index -= 1) {
        const randomIndex = Math.floor(Math.random() * (index + 1));
        [shuffled[index], shuffled[randomIndex]] = [shuffled[randomIndex], shuffled[index]];
      }
      return shuffled;
    }

    const makeInitialAnswers = () => questions.map((question) => ({
      selectedParts: [],
      status: "unanswered",
      answered: false,
      choiceOrder: shuffleChoices(question.choices)
    }));

    let answers = makeInitialAnswers();
    let activeQueue = [];
    let currentQueuePosition = 0;
    let activeTitle = "";
    let baseQueue = [];
    let seriesReturnTarget = null;

    const $ = (id) => document.getElementById(id);
    const seriesScreen = $("seriesScreen");
    const gameScreen = $("gameScreen");
    const summaryScreen = $("summaryScreen");

    function showOnly(screen) {
      [seriesScreen, gameScreen, summaryScreen].forEach((item) => item.classList.toggle("hidden", item !== screen));
      document.body.classList.toggle("game-active", screen === gameScreen);
    }

    function displayPart(part) {
      return part === "辶" ? "⻌" : part;
    }

    function partAriaLabel(part) {
      return part === "辶" ? "一点しんにょう" : part;
    }

    function indexesForSeries(seriesId) {
      return questions.map((question, index) => ({ question, index }))
        .filter(({ question }) => question.seriesId === seriesId)
        .map(({ index }) => index);
    }

    function countStatus(indexes, status) {
      return indexes.filter((index) => answers[index].status === status).length;
    }

    function isSeriesComplete(seriesId) {
      const indexes = indexesForSeries(seriesId);
      return indexes.length > 0 && indexes.every((index) => answers[index].status === "correct");
    }

    function renderSeriesScreen() {
      showOnly(seriesScreen);
      $("resumeButton").classList.toggle("hidden", !seriesReturnTarget);
      $("resumeButton").textContent = seriesReturnTarget === "summary" ? "結果にもどる" : "ゲームにもどる";
      const grid = $("seriesGrid");
      grid.replaceChildren();

      seriesOrder.forEach((series) => {
        const indexes = indexesForSeries(series.id);
        const correct = countStatus(indexes, "correct");
        const complete = isSeriesComplete(series.id);
        const button = document.createElement("button");
        button.type = "button";
        button.className = `series-button${complete ? " complete" : ""}`;
        button.innerHTML = `
          <span class="series-top">
            <span class="series-name">${series.name}</span>
            <span class="series-radical">${displayPart(series.radical)}</span>
          </span>
          <span class="series-progress">正解 ${correct} / ${indexes.length}</span>
          ${complete ? '<span class="badge-mark">★ 達成！</span>' : ""}
        `;
        button.addEventListener("click", () => startSeries(series.id, series.name));
        grid.appendChild(button);
      });
    }

    function startSeries(seriesId, title) {
      seriesReturnTarget = null;
      baseQueue = indexesForSeries(seriesId);
      activeQueue = [...baseQueue];
      activeTitle = title;
      currentQueuePosition = 0;
      renderGame();
    }

    function startAllQuestions() {
      seriesReturnTarget = null;
      baseQueue = questions.map((_, index) => index);
      activeQueue = [...baseQueue];
      activeTitle = "ぜんぶの問題";
      currentQueuePosition = 0;
      renderGame();
    }

    function startGrade(grade) {
      seriesReturnTarget = null;
      baseQueue = questions
        .map((question, index) => ({ question, index }))
        .filter(({ question }) => question.grade === grade)
        .map(({ index }) => index);
      activeQueue = [...baseQueue];
      activeTitle = `小学${grade}年の問題`;
      currentQueuePosition = 0;
      renderGame();
    }

    function currentQuestionIndex() {
      return activeQueue[currentQueuePosition];
    }

    function renderGame() {
      showOnly(gameScreen);
      const index = currentQuestionIndex();
      const question = questions[index];
      const state = answers[index];

      $("questionMeta").textContent = `${activeTitle}　${currentQueuePosition + 1} / ${activeQueue.length} 問`;
      $("meterFill").style.width = `${((currentQueuePosition + 1) / activeQueue.length) * 100}%`;
      $("scoreText").textContent = `スコア ${countStatus(activeQueue, "correct")} / ${activeQueue.length}`;
      renderReadingPrompt(question);
      $("gradeText").textContent = `小学${question.grade}年生　${question.seriesName}`;
      $("slotA").textContent = state.selectedParts[0] ? displayPart(state.selectedParts[0]) : "?";
      $("slotB").textContent = state.selectedParts[1] ? displayPart(state.selectedParts[1]) : "?";

      const choices = $("choices");
      choices.replaceChildren();
      state.choiceOrder.forEach((part) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `part-button${state.selectedParts.includes(part) ? " selected" : ""}`;
        button.textContent = displayPart(part);
        button.disabled = state.status === "correct";
        button.setAttribute("aria-label", `${partAriaLabel(part)}を選ぶ`);
        button.addEventListener("click", () => selectPart(part));
        choices.appendChild(button);
      });

      $("backButton").disabled = currentQueuePosition === 0;
      $("checkButton").disabled = state.status === "correct";
      $("skipButton").disabled = state.status === "correct";
      $("nextButton").textContent = currentQueuePosition === activeQueue.length - 1 ? "結果へ" : "つぎへ";
      renderFeedback();
    }

    function renderReadingPrompt(question) {
      const label = $("promptLabel");
      const reading = $("readingText");
      const target = question.targetReading;
      const targetStart = question.reading.indexOf(target);

      label.textContent = target === question.reading
        ? `「${question.reading}」を漢字一文字で作ろう`
        : `「${question.reading}」の中の「${target}」を漢字一文字で作ろう`;

      if (targetStart < 0 || target === question.reading) {
        reading.textContent = question.reading;
        return;
      }

      const targetSpan = document.createElement("span");
      targetSpan.className = "target-reading";
      targetSpan.textContent = target;
      reading.replaceChildren(
        question.reading.slice(0, targetStart),
        targetSpan,
        question.reading.slice(targetStart + target.length)
      );
    }

    function renderFeedback() {
      const question = questions[currentQuestionIndex()];
      const state = answers[currentQuestionIndex()];
      const box = $("feedback");
      const main = $("feedbackMain");
      const sub = $("feedbackSub");
      box.className = "feedback";

      if (state.status === "correct") {
        box.classList.add("correct");
        main.innerHTML = `
          <span class="answer-line answer-kanji">${question.kanji}</span>
          <span class="answer-line answer-word">${question.word}</span>
          <span class="answer-line answer-reading">${question.reading}</span>
          <span class="answer-line answer-meaning">${question.meaning}</span>
          <span class="answer-line answer-picture">${question.picture}</span>
          <span class="answer-parts">
            <span class="answer-parts-title">パーツの意味</span>
            <span>${displayPart(question.radical)}（${question.seriesName}）：${question.radicalMeaning}</span>
            <span>${displayPart(question.otherPart)}：${question.otherPartMeaning}</span>
          </span>
          <span class="answer-note">${question.note}</span>
        `;
        sub.textContent = "";
      } else if (state.status === "wrong") {
        box.classList.add("wrong");
        main.textContent = "もう一度考えてみよう";
        sub.textContent = question.hint;
      } else if (state.status === "skipped") {
        main.textContent = "あとでまたやってみよう";
        sub.textContent = question.hint;
      } else {
        main.textContent = "パーツを選んでみよう";
        sub.textContent = "2つ選んだら「こたえあわせ」を押してね。";
      }
    }

    function selectPart(part) {
      const state = answers[currentQuestionIndex()];
      if (state.status === "correct") return;
      if (state.selectedParts.includes(part)) {
        state.selectedParts = state.selectedParts.filter((item) => item !== part);
      } else if (state.selectedParts.length < 2) {
        state.selectedParts.push(part);
      } else {
        state.selectedParts = [state.selectedParts[1], part];
      }
      if (state.status !== "correct") {
        state.status = "unanswered";
        state.answered = false;
      }
      renderGame();
    }

    function checkAnswer() {
      const question = questions[currentQuestionIndex()];
      const state = answers[currentQuestionIndex()];
      if (state.selectedParts.length !== 2) {
        $("feedback").className = "feedback wrong";
        $("feedbackMain").textContent = "パーツを2つ選んでね";
        $("feedbackSub").textContent = "候補から、組み合わせたいパーツを選ぼう。";
        return;
      }

      state.answered = true;
      const isCorrect = question.parts.every((part) => state.selectedParts.includes(part));
      state.status = isCorrect ? "correct" : "wrong";
      playSound(isCorrect ? "correct" : "wrong");
      renderGame();
    }

    function skipQuestion() {
      const state = answers[currentQuestionIndex()];
      state.status = "skipped";
      state.answered = false;
      goNext();
    }

    function resetCurrent() {
      const index = currentQuestionIndex();
      answers[index] = {
        selectedParts: [],
        status: "unanswered",
        answered: false,
        choiceOrder: answers[index].choiceOrder
      };
      renderGame();
    }

    function goBack() {
      if (currentQueuePosition > 0) {
        currentQueuePosition -= 1;
        renderGame();
      }
    }

    function goNext() {
      if (currentQueuePosition < activeQueue.length - 1) {
        currentQueuePosition += 1;
        renderGame();
      } else {
        showSummary();
      }
    }

    function pendingIndexes(indexes) {
      return indexes.filter((index) => ["wrong", "skipped", "unanswered"].includes(answers[index].status));
    }

    function showSummary() {
      showOnly(summaryScreen);
      $("summaryTitle").textContent = activeTitle;
      $("correctCount").textContent = countStatus(activeQueue, "correct");
      $("wrongCount").textContent = countStatus(activeQueue, "wrong");
      $("skippedCount").textContent = countStatus(activeQueue, "skipped");
      $("unansweredCount").textContent = countStatus(activeQueue, "unanswered");

      const pending = pendingIndexes(activeQueue);
      $("retryButton").disabled = pending.length === 0;
      renderBadges();
      renderReviewList(pending);
    }

    function renderBadges() {
      const grid = $("badgeGrid");
      grid.replaceChildren();
      seriesOrder.forEach((series) => {
        const complete = isSeriesComplete(series.id);
        const item = document.createElement("div");
        item.className = `badge-item${complete ? " complete" : ""}`;
        item.innerHTML = `<span class="badge-icon">${complete ? "★" : "☆"}</span>${series.name}`;
        grid.appendChild(item);
      });
    }

    function renderReviewList(pending) {
      const list = $("reviewList");
      list.replaceChildren();
      if (pending.length === 0) {
        const message = document.createElement("p");
        message.className = "feedback-sub";
        message.textContent = "復習する問題はありません。よくがんばりました。";
        list.appendChild(message);
        return;
      }

      const labels = { wrong: "不正解", skipped: "わからない", unanswered: "未回答" };
      pending.forEach((index) => {
        const question = questions[index];
        const button = document.createElement("button");
        button.type = "button";
        button.className = "review-button";
        button.textContent = `${question.seriesName}：${question.reading}（${labels[answers[index].status]}）`;
        button.addEventListener("click", () => startReviewAt(pending, index));
        list.appendChild(button);
      });
    }

    function startReviewAt(pending, firstIndex) {
      activeQueue = [...pending];
      activeTitle = "復習モード";
      currentQueuePosition = activeQueue.indexOf(firstIndex);
      renderGame();
    }

    function startReview() {
      const pending = pendingIndexes(activeQueue);
      if (pending.length > 0) startReviewAt(pending, pending[0]);
    }

    function replayCurrentSet() {
      baseQueue.forEach((index) => {
        answers[index] = {
          selectedParts: [],
          status: "unanswered",
          answered: false,
          choiceOrder: shuffleChoices(questions[index].choices)
        };
      });
      activeQueue = [...baseQueue];
      currentQueuePosition = 0;
      renderGame();
    }

    function openSeriesScreen(returnTarget) {
      seriesReturnTarget = returnTarget;
      renderSeriesScreen();
    }

    function returnFromSeriesScreen() {
      if (seriesReturnTarget === "summary") {
        showSummary();
      } else if (seriesReturnTarget === "game") {
        renderGame();
      }
    }

    function playSound(type) {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;
      const context = new AudioContext();
      const masterGain = context.createGain();
      masterGain.gain.value = 0.82;
      masterGain.connect(context.destination);

      if (context.state === "suspended") context.resume();

      const tones = type === "correct"
        ? [
            [523.25, 0.00, 0.62, 0.070],
            [659.25, 0.14, 0.68, 0.064],
            [783.99, 0.29, 0.76, 0.058],
            [1046.50, 0.46, 0.92, 0.050]
          ]
        : [
            [329.63, 0.00, 0.32, 0.045],
            [293.66, 0.18, 0.38, 0.038]
          ];

      tones.forEach(([frequency, start, duration, volume]) => {
        playSoftTone(context, masterGain, frequency, start, duration, volume);
      });
      setTimeout(() => context.close(), type === "correct" ? 1700 : 900);
    }

    function playSoftTone(context, output, frequency, start, duration, volume) {
      const oscillator = context.createOscillator();
      const toneGain = context.createGain();
      const startTime = context.currentTime + start;
      const endTime = startTime + duration;

      oscillator.type = "sine";
      oscillator.frequency.value = frequency;
      oscillator.connect(toneGain);
      toneGain.connect(output);

      toneGain.gain.setValueAtTime(0.0001, startTime);
      toneGain.gain.exponentialRampToValueAtTime(volume, startTime + 0.035);
      toneGain.gain.exponentialRampToValueAtTime(volume * 0.32, startTime + duration * 0.42);
      toneGain.gain.exponentialRampToValueAtTime(0.0001, endTime);

      oscillator.start(startTime);
      oscillator.stop(endTime + 0.03);
    }

    $("allQuestionsButton").addEventListener("click", startAllQuestions);
    $("grade5Button").addEventListener("click", () => startGrade(5));
    $("grade6Button").addEventListener("click", () => startGrade(6));
    $("resumeButton").addEventListener("click", returnFromSeriesScreen);
    $("checkButton").addEventListener("click", checkAnswer);
    $("skipButton").addEventListener("click", skipQuestion);
    $("backButton").addEventListener("click", goBack);
    $("nextButton").addEventListener("click", goNext);
    $("resetButton").addEventListener("click", resetCurrent);
    $("chooseSeriesButton").addEventListener("click", () => openSeriesScreen("game"));
    $("retryButton").addEventListener("click", startReview);
    $("replayButton").addEventListener("click", replayCurrentSet);
    $("seriesButton").addEventListener("click", () => openSeriesScreen("summary"));

    renderSeriesScreen();
  </script>
</body>
</html>
